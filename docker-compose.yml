version: "3.9"

# -----------------------------------------------------------------------------
#  The Podcaster – Local Podcast Automation Platform
# -----------------------------------------------------------------------------
# This compose file spins up every service required for end-to-end processing.
# Most services are optional during early development and can be commented out
# if you only want a subset of functionality.
# -----------------------------------------------------------------------------

services:

  # ---------------------------------------------------------------------------
  # FastAPI backend – REST API & task dispatcher
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    container_name: podcaster-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/code
      - ./data:/data  # audio/video artifacts
      - ./test/Intro_Outro_test.mp3:/data/preloaded_test_files/Intro_Outro_test.mp3:ro
      - ./test/Main_Audio_test.wav:/data/preloaded_test_files/Main_Audio_test.wav:ro
      - ./data/fb_uploads:/fb_uploads:ro # Mount for read-only access by backend
      - ./logs:/app/logs # ensure logs directory is explicitly mounted
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - OLLAMA_URL=${OLLAMA_URL}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB}
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - broker
    networks: # Add backend to the network
      - podcaster_network

  # ---------------------------------------------------------------------------
  # Celery worker – background heavy-lifting (FFmpeg, Whisper, etc.)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
    container_name: podcaster-worker
    command: ["celery", "-A", "app.workers.tasks:celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/code
      - ./data:/data
      - ./test/Intro_Outro_test.mp3:/data/preloaded_test_files/Intro_Outro_test.mp3:ro
      - ./test/Main_Audio_test.wav:/data/preloaded_test_files/Main_Audio_test.wav:ro
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - OLLAMA_URL=${OLLAMA_URL}
    depends_on:
      - broker
      - db
    networks: # Add worker to the network
      - podcaster_network

  # ---------------------------------------------------------------------------
  # Database – PostgreSQL 15
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: podcaster-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: podcaster
      POSTGRES_USER: podcaster
      POSTGRES_PASSWORD: podcaster
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: # Add db to the network
      - podcaster_network

  # ---------------------------------------------------------------------------
  # Redis – broker & result backend
  # ---------------------------------------------------------------------------
  broker:
    image: redis:7-alpine
    container_name: podcaster-redis
    restart: unless-stopped
    networks: # Add broker to the network
      - podcaster_network

  # ---------------------------------------------------------------------------
  # Ollama – local LLM server (CPU or GPU)
  # ---------------------------------------------------------------------------
 #  ollama:
 #    image: ollama/ollama:latest
 #    container_name: podcaster-ollama
 #    restart: unless-stopped
 #    ports:
 #      - "11434:11434"
 #    volumes:
 #      - ollama_models:/root/.ollama

  # ---------------------------------------------------------------------------
  # n8n – workflow automation (optional, comment until Milestone 6)
  # ---------------------------------------------------------------------------
 #  n8n:
 #    image: n8nio/n8n:latest
 #    container_name: podcaster-n8n
 #    restart: unless-stopped
 #    ports:
 #      - "5678:5678"
 #    environment:
 #      - N8N_BASIC_AUTH_ACTIVE=true   # <-- Change credentials in .env
 #      - N8N_BASIC_AUTH_USER=admin
 #      - N8N_BASIC_AUTH_PASSWORD=admin
 #    volumes:
 #      - n8n_data:/home/node/.n8n
 #    depends_on:
 #      - db
 #    networks: # Add n8n to the network (when uncommented)
 #      - podcaster_network

  # ---------------------------------------------------------------------------
  # Front-end – placeholder Nginx serving AudioMass static build
  # ---------------------------------------------------------------------------
  frontend:
    image: nginx:1.25-alpine
    container_name: podcaster-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80" # Default to 8080 if FRONTEND_PORT is not set
    volumes:
      - ./frontend:/usr/share/nginx/html:ro # Static front-end SPA
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro # Custom proxy & upload limits
    networks: # Add frontend to the network
      - podcaster_network

  # ---------------------------------------------------------------------------
  # File Browser – web UI for managing files
  # ---------------------------------------------------------------------------
  filebrowser:
    image: filebrowser/filebrowser:v2.32.0
    container_name: podcaster-filebrowser
    restart: unless-stopped
    volumes:
      - ./data/fb_uploads:/srv
      - ./filebrowser.db:/database.db
      - ./filebrowser_settings.json:/.filebrowser.json
    ports:
      - "3006:80"
    user: "1000:1000"
    networks:
      - podcaster_network
    depends_on:
      - backend # For webhook
      - filebrowser_config_gen # Ensure config files are "managed" by compose

  # ---------------------------------------------------------------------------
  # File Browser Config Generator - one-shot service to "initialize"
  # ---------------------------------------------------------------------------
  filebrowser_config_gen:
    image: alpine/git # Small image with shell, can use busybox too
    container_name: podcaster-filebrowser-config-gen
    command: |
      sh -c "
        echo 'Ensuring File Browser config directory and files structure...'
        mkdir -p /config_target/data/fb_uploads
        touch /config_target/filebrowser.db
        if [ ! -f /config_target/filebrowser_settings.json ]; then
          echo 'Filebrowser settings not found, creating default.'
          # This default is minimal, actual config is mounted from host by filebrowser service
          echo '{}' > /config_target/filebrowser_settings.json
        else
          echo 'Filebrowser settings already exists.'
        fi
        echo 'File Browser config generation step finished.'
      "
    volumes:
      - ./:/config_target # Mount project root to access/create files
    # This service runs, performs its action, and exits.
    # It's a way to codify the creation of these files within compose lifecycle,
    # though manual creation outside compose is also fine and often simpler.

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  podcaster_network:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
  ollama_models:
  n8n_data:
  # logs_data: # if logs are managed by a named volume; ./logs is a bind mount for now
